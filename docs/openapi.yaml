openapi: 3.0.0
info:
  title: Rate Limiting API Gateway
  description: Production-grade API Gateway with JWT authentication, rate limiting, and API key management
  version: 1.0.0
  contact:
    name: Durga Prasad
    email: kondurudurgaprasad.2@gmail.com
  license:
    name: MIT

servers:
  - url: http://localhost:5050
    description: Development server
  - url: https://your-app.railway.app
    description: Production server

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the API and its dependencies
      tags:
        - Health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  uptimeSeconds:
                    type: number
                    example: 123
                  timestamp:
                    type: number
                    example: 1640995200000

  /api/v1/auth/register:
    post:
      summary: Register a new user
      description: Create a new user account with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  minLength: 8
                  example: "securePassword123"
                name:
                  type: string
                  example: "John Doe"
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User registered successfully"
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
        '400':
          description: Bad request
        '409':
          description: User already exists

  /api/v1/auth/login:
    post:
      summary: Login user
      description: Authenticate user and return JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                password:
                  type: string
                  example: "securePassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
        '401':
          description: Invalid credentials

  /api/v1/ping:
    get:
      summary: Ping endpoint
      description: Simple ping endpoint for testing API key authentication
      tags:
        - API Keys
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Ping successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "pong"
                  timestamp:
                    type: string
                    example: "2024-01-01T00:00:00.000Z"
        '401':
          description: Invalid or missing API key

  /api/v1/protected:
    get:
      summary: Protected endpoint
      description: Example of JWT-protected endpoint
      tags:
        - Authentication
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Access granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Access granted to protected resource"
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
        '401':
          description: Invalid or missing token

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT authentication token"
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: "API key for authentication"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Error message"
        message:
          type: string
          example: "Detailed error description"
        code:
          type: string
          example: "ERROR_CODE"

tags:
  - name: Health
    description: Health check endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: API Keys
    description: API key management and authentication
